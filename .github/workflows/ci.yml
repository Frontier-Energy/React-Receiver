name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: react-receiver
  CONTAINERAPP_NAME: react-receiver
  CONTAINERAPP_RESOURCE_GROUP: jmc-sandbox

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run unit tests
        run: dotnet test React-Receiver.sln --configuration Release

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: false

      - name: Set subscription
        run: az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Verify Container App exists
        run: |
          az containerapp show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$CONTAINERAPP_RESOURCE_GROUP"

      - name: Build and push image
        run: |
          az acr login --name "$ACR_NAME"
          docker build -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest" .
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

      - name: Deploy latest image to Container App
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$CONTAINERAPP_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"
