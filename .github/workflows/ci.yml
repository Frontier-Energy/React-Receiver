name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - uat
          - prod
      git_ref:
        description: "Git ref to deploy"
        required: false
        default: "main"
        type: string

jobs:
  test:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore React-Receiver.sln

      - name: Build with warnings as errors
        run: dotnet build React-Receiver.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Run unit tests
        run: dotnet test React-Receiver.sln --configuration Release --no-build --no-restore /p:TreatWarningsAsErrors=true

      - name: Azure CLI version
        run: az version

      - name: Ensure Bicep CLI is installed
        run: az bicep install

      - name: Lint Bicep templates
        run: |
          az bicep lint --file infra/main.bicep

      - name: Build Bicep templates
        run: |
          az bicep build --file infra/main.bicep
          for param_file in infra/environments/*.bicepparam; do
            az bicep build-params --file "$param_file"
          done

  deploy-dev:
    name: Deploy dev
    needs: test
    if: github.event_name == 'push'
    uses: ./.github/workflows/deploy.yml
    with:
      target_environment: dev
      git_ref: ${{ github.ref }}
    secrets: inherit

  deploy-uat:
    name: Deploy uat
    needs:
      - deploy-dev
    if: github.event_name == 'push' && needs.deploy-dev.result == 'success'
    uses: ./.github/workflows/deploy.yml
    with:
      target_environment: uat
      git_ref: ${{ github.ref }}
    secrets: inherit

  deploy-prod:
    name: Deploy prod
    needs:
      - deploy-uat
    if: github.event_name == 'push' && needs.deploy-uat.result == 'success'
    uses: ./.github/workflows/deploy.yml
    with:
      target_environment: prod
      git_ref: ${{ github.ref }}
    secrets: inherit

  deploy-manual:
    name: Deploy manual target
    needs: test
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    with:
      target_environment: ${{ inputs.target_environment }}
      git_ref: ${{ inputs.git_ref }}
    secrets: inherit
