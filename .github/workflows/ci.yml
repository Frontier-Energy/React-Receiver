name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - uat
          - prod
      git_ref:
        description: "Git ref to deploy"
        required: false
        default: "main"
        type: string

env:
  IMAGE_NAME: qcontrol-service
  AZURE_SUBSCRIPTION_ID: b7ae9f0b-20c3-4174-bb60-4ca01a867b8b

jobs:
  test:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore React-Receiver.sln

      - name: Build with warnings as errors
        run: dotnet build React-Receiver.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Run unit tests
        run: dotnet test React-Receiver.sln --configuration Release --no-build --no-restore /p:TreatWarningsAsErrors=true

      - name: Azure CLI version
        run: az version

      - name: Ensure Bicep CLI is installed
        run: az bicep install

      - name: Lint Bicep templates
        run: |
          az bicep lint --file infra/main.bicep

      - name: Build Bicep templates
        run: |
          az bicep build --file infra/main.bicep
          for param_file in infra/environments/*.bicepparam; do
            az bicep build-params --file "$param_file"
          done

  deploy-dev:
    name: Deploy dev
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref }}

      - name: Resolve deployment target
        run: |
          TARGET_ENV="dev"
          RESOURCE_GROUP="rg-qcontrol-service-cus-$TARGET_ENV"
          PARAM_FILE="infra/environments/$TARGET_ENV.bicepparam"

          echo "TARGET_ENV=$TARGET_ENV" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> "$GITHUB_ENV"
          echo "PARAM_FILE=$PARAM_FILE" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: false

      - name: Set subscription
        run: az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "centralus"

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "$PARAM_FILE" \
            --query properties.outputs \
            --output json > deployment-outputs.json

          ACR_NAME="$(jq -r '.containerRegistryName.value' deployment-outputs.json)"
          ACR_LOGIN_SERVER="$(jq -r '.acrLoginServer.value' deployment-outputs.json)"
          CONTAINERAPP_NAME="$(jq -r '.containerAppName.value' deployment-outputs.json)"
          APPLICATION_CONTAINER_PORT="$(jq -r '.applicationContainerPort.value' deployment-outputs.json)"
          APIM_GATEWAY_URL="$(jq -r '.apiManagementGatewayUrl.value' deployment-outputs.json)"
          CONTAINERAPP_URL="$(jq -r '.containerAppUrl.value' deployment-outputs.json)"

          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
          echo "CONTAINERAPP_NAME=$CONTAINERAPP_NAME" >> "$GITHUB_ENV"
          echo "APPLICATION_CONTAINER_PORT=$APPLICATION_CONTAINER_PORT" >> "$GITHUB_ENV"
          echo "APIM_GATEWAY_URL=$APIM_GATEWAY_URL" >> "$GITHUB_ENV"
          echo "CONTAINERAPP_URL=$CONTAINERAPP_URL" >> "$GITHUB_ENV"

      - name: Compute image version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="${TARGET_ENV}-${{ github.run_number }}-${SHORT_SHA}"
          REVISION_SUFFIX="r${{ github.run_number }}-${SHORT_SHA}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "REVISION_SUFFIX=$REVISION_SUFFIX" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          az acr login --name "$ACR_NAME"
          docker build \
            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" \
            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest" \
            .
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

      - name: Configure Container App registry access
        run: |
          az containerapp registry set \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --server "$ACR_LOGIN_SERVER" \
            --identity system

      - name: Deploy versioned image to Container App
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            --revision-suffix "$REVISION_SUFFIX" \
            --set-env-vars \
              "APP_VERSION=$IMAGE_TAG" \
              "GIT_SHA=${{ github.sha }}"

          az containerapp ingress update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --target-port "$APPLICATION_CONTAINER_PORT"

      - name: Deployment summary
        run: |
          {
            echo "### Deployment"
            echo ""
            echo "- Environment: $TARGET_ENV"
            echo "- Resource group: $RESOURCE_GROUP"
            echo "- Container App: $CONTAINERAPP_NAME"
            echo "- Container App URL: $CONTAINERAPP_URL"
            echo "- APIM Gateway URL: $APIM_GATEWAY_URL"
            echo "- Image tag: $IMAGE_TAG"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-uat:
    name: Deploy uat
    runs-on: ubuntu-latest
    needs:
      - deploy-dev
    if: github.event_name == 'push' && needs.deploy-dev.result == 'success'
    environment: uat
    steps:
      - uses: actions/checkout@v4
