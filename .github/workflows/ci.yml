            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" \
            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest" \
            .
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

      - name: Configure Container App registry access
        run: |
          az containerapp registry set \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --server "$ACR_LOGIN_SERVER" \
            --identity system

      - name: Deploy versioned image to Container App
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            --revision-suffix "$REVISION_SUFFIX" \
            --set-env-vars \
              "APP_VERSION=$IMAGE_TAG" \
              "GIT_SHA=${{ github.sha }}"

          az containerapp ingress update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --target-port "$APPLICATION_CONTAINER_PORT"

      - name: Deployment summary
        run: |
          {
            echo "### Deployment"
            echo ""
            echo "- Environment: $TARGET_ENV"
            echo "- Resource group: $RESOURCE_GROUP"
            echo "- Container App: $CONTAINERAPP_NAME"
            echo "- Container App URL: $CONTAINERAPP_URL"
            echo "- APIM Gateway URL: $APIM_GATEWAY_URL"
            echo "- Image tag: $IMAGE_TAG"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-manual:
    name: Deploy manual target
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Resolve deployment target
        run: |
          TARGET_ENV="${{ inputs.target_environment }}"
          RESOURCE_GROUP="rg-qcontrol-service-cus-$TARGET_ENV"
          PARAM_FILE="infra/environments/$TARGET_ENV.bicepparam"

          echo "TARGET_ENV=$TARGET_ENV" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> "$GITHUB_ENV"
